<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Milo — redirecting…</title>
<!-- Fallback for JS-disabled clients: send everyone to the app. -->
<meta http-equiv="refresh" content="0; url=/mileage-tracker/">
<style>
  html,body{height:100%;margin:0}
  body{
    display:flex;align-items:center;justify-content:center;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    background:#0a0f1a;color:#e8edf5;text-align:center;padding:24px;
  }
  .wrap{max-width:360px}
  .dot{
    width:40px;height:40px;margin:0 auto 20px;border-radius:50%;
    border:3px solid rgba(79,158,255,.25);border-top-color:#4f9eff;
    animation:spin .8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  h1{font-size:20px;font-weight:700;margin:0 0 8px}
  p{font-size:14px;color:#8b95a8;margin:0 0 20px;line-height:1.5}
  a{color:#4f9eff;text-decoration:none;font-weight:600}
</style>
</head>
<body>
  <div class="wrap">
    <div class="dot"></div>
    <h1>Taking you to Milo…</h1>
    <p>One moment while we finish signing you in.</p>
    <p><a id="manual" href="/mileage-tracker/">Continue to Milo →</a></p>
  </div>
<script>
  // Preserve the URL hash (Supabase puts #access_token=... here on confirm/
  // recovery links) and any query string, so the app can complete the login.
  (function () {
    var target = '/mileage-tracker/' + (window.location.search || '') + (window.location.hash || '');
    var link = document.getElementById('manual');
    if (link) link.setAttribute('href', target);
    window.location.replace(target);
  })();
</script>
</body>
</html>
